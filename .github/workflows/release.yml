name: Release CLI Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.2.0) — must match package.json version'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/cli
        run: bun install --frozen-lockfile

      - name: Build npm bundle
        working-directory: packages/cli
        run: bun run build && chmod +x dist/cli.js bin/wasper.js

      - name: Build standalone binaries
        working-directory: packages/cli
        run: bun scripts/build-binaries.ts

      - name: List built assets
        run: ls -lh packages/cli/dist/bin/

      - name: Publish to npm
        working-directory: packages/cli
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
          bun publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release & upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: wasper ${{ env.TAG }}
          body: |
            ## wasper ${{ env.TAG }}

            ### One-line install (macOS / Linux)
            ```bash
            curl -fsSL https://studio.stroke.click/install.sh | sh
            ```

            ### Install via bun / npm
            ```bash
            bun add -g wasper-cli
            # or
            npm install -g wasper-cli
            ```

            ### Standalone binaries (no runtime required)
            Download the binary for your platform below and place it in your `$PATH`.

            | Platform | File |
            |---|---|
            | Linux x64 | `wasper-linux-x64` |
            | Linux ARM64 | `wasper-linux-arm64` |
            | macOS x64 | `wasper-darwin-x64` |
            | macOS ARM64 (Apple Silicon) | `wasper-darwin-arm64` |
            | Windows x64 | `wasper-windows-x64.exe` |

            ---
            After installing, run:
            ```bash
            wasper --url https://petstore.swagger.io/v2/swagger.json
            ```
          files: |
            packages/cli/dist/bin/wasper-linux-x64
            packages/cli/dist/bin/wasper-linux-arm64
            packages/cli/dist/bin/wasper-darwin-x64
            packages/cli/dist/bin/wasper-darwin-arm64
            packages/cli/dist/bin/wasper-windows-x64.exe
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
