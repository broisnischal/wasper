name: Release CLI Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.3.0) — must match package.json version'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

# ── 1. Build each platform's binary natively ──────────────────────────────────
jobs:
  build:
    name: Build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            bun-target: bun-linux-x64
            asset: wasper-linux-x64

          - os: ubuntu-latest
            label: linux-arm64
            bun-target: bun-linux-arm64
            asset: wasper-linux-arm64

          - os: macos-latest
            label: darwin-x64
            bun-target: bun-darwin-x64
            asset: wasper-darwin-x64

          - os: macos-latest
            label: darwin-arm64
            bun-target: bun-darwin-arm64
            asset: wasper-darwin-arm64

          - os: windows-latest
            label: windows-x64
            bun-target: bun-windows-x64
            asset: wasper-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/cli
        run: bun install --frozen-lockfile

      - name: Build binary
        working-directory: packages/cli
        shell: bash
        run: |
          mkdir -p dist/bin
          bun build --compile --minify --target=${{ matrix.bun-target }} \
            ./cli.ts --outfile dist/bin/${{ matrix.asset }}

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        run: ./dist/bin/${{ matrix.asset }} --version || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/cli
        shell: pwsh
        run: .\dist\bin\${{ matrix.asset }} --version; exit 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.label }}
          path: packages/cli/dist/bin/${{ matrix.asset }}
          retention-days: 1

# ── 2. GitHub Release (binaries) then npm publish ─────────────────────────────
  release:
    name: Release & Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download all platform binaries ──────────────────────────────────────
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: release-assets
          merge-multiple: true

      - name: Make Unix binaries executable
        run: chmod +x release-assets/wasper-linux-x64 release-assets/wasper-linux-arm64 release-assets/wasper-darwin-x64 release-assets/wasper-darwin-arm64

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          sha256sum wasper-linux-x64 wasper-linux-arm64 \
                    wasper-darwin-x64 wasper-darwin-arm64 \
                    wasper-windows-x64.exe > checksums.txt
          echo "--- checksums ---"
          cat checksums.txt

      # ── Create GitHub Release with all binaries FIRST ───────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: wasper ${{ env.TAG }}
          body: |
            ## wasper ${{ env.TAG }}

            ### One-line install (macOS / Linux — no dependencies)
            ```bash
            curl -fsSL https://studio.stroke.click/install.sh | sh
            ```

            ### Install via package manager
            ```bash
            bun add -g wasper-cli   # requires bun runtime
            npm install -g wasper-cli
            ```

            ### Standalone binaries
            Download the binary for your platform, make it executable, and place it in your `$PATH`.

            | Platform | File |
            |---|---|
            | Linux x64 | `wasper-linux-x64` |
            | Linux ARM64 | `wasper-linux-arm64` |
            | macOS x64 (Intel) | `wasper-darwin-x64` |
            | macOS ARM64 (Apple Silicon) | `wasper-darwin-arm64` |
            | Windows x64 | `wasper-windows-x64.exe` |

            Verify integrity with `checksums.txt` (SHA-256).

            ---
            ```bash
            wasper --url https://petstore.swagger.io/v2/swagger.json
            ```
          files: |
            release-assets/wasper-linux-x64
            release-assets/wasper-linux-arm64
            release-assets/wasper-darwin-x64
            release-assets/wasper-darwin-arm64
            release-assets/wasper-windows-x64.exe
            release-assets/checksums.txt
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}

      # ── Build npm bundle then publish via npm (reliable auth) ───────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: packages/cli
        run: bun install --frozen-lockfile

      - name: Build npm bundle
        working-directory: packages/cli
        run: bun run build && chmod +x dist/cli.js bin/wasper.js

      - name: Setup Node (for npm publish auth)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
